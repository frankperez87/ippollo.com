# Fully static deploy: `nuxt generate` emits prerendered HTML + assets to .output/public.
# Node version comes from .nvmrc (24, current LTS), which Netlify auto-detects — do not set
# a NODE_VERSION env var here, it would override .nvmrc.
[build]
  command = "npm run generate"
  publish = ".output/public"

# Long-cache the fingerprinted build assets.
[[headers]]
  for = "/_nuxt/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
